<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACM Card</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0f172a;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    .card {
        width: 600px;
        height: 300px;
        margin: 0 auto;
        margin-top: 50px;
        background: linear-gradient(135deg, #1e293b, #020617);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        color: white;
        padding: 30px;
        box-sizing: border-box;
        position: relative;
    }

    .title {
        font-size: 26px;
        font-weight: bold;
        margin-bottom: 10px;
        color: #38bdf8;
    }

    .divider {
        height: 1px;
        background: rgba(255,255,255,0.1);
        margin: 15px 0;
    }

    .row {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
        font-size: 18px;
    }

    .label {
        color: #94a3b8;
    }

    .value {
        font-weight: bold;
        color: #e2e8f0;
    }

    .score {
        font-size: 40px;
        font-weight: bold;
        text-align: center;
        margin-top: 10px;
        color: #22c55e;
    }

    .footer {
        position: absolute;
        bottom: 15px;
        right: 20px;
        font-size: 12px;
        color: #64748b;
    }
</style>
</head>
<body>

<div class="card">
    <div class="title">ACM Profile Card</div>

    <div class="divider"></div>

    <div class="row">
        <div class="label">QQ Name</div>
        <div class="value">{{qq_name}}</div>
    </div>

    <div class="row">
        <div class="label">CF Handle</div>
        <div class="value">{{cf_name}}</div>
    </div>

    <div class="row">
        <div class="label">Solved Problems</div>
        <div class="value">{{solved}}</div>
    </div>

    <div class="divider"></div>

    <div class="score">
        {{score}}
    </div>

    <div class="footer">
        Generated by YourBot
    </div>
</div>

</body>
</html>
